{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="register-container">
    <h2 style="text-align: center;">Регистрация</h2>
    
    <div class="icon-container">
    <i class="fa-regular fa-circle-user profile-icon"></i>
    </div>

    <form action="" method="post">
        <div class="form-row">
            <div class="form-column">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required placeholder="Минимум 3 символа">
                    <span class="help-text">Только латиница, цифры, символы _ и -</span>
                </div>
            </div>
            
            <div class="form-column">
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label for="password_confirm">Подтверждение пароля</label>
                    <input type="password" id="password_confirm" name="password_confirm" required>
                </div>
            </div>
        </div>

        <div class="btn-container">
        <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </div>
    </form>
    
    <p style="text-align: center; margin-top: 15px;">
        Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
    </p>
</div>
{% endblock %}
